<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daw2ni</title>
    <meta name="description" content="Open Daw2ni App to view meals and restaurants.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FF9700 0%, #FFB347 100%);
            --secondary-gradient: linear-gradient(135deg, #1f4037 0%, #99f2c8 100%);
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Mesh */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 10% 10%, rgba(255, 151, 0, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(255, 151, 0, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1) 0%, rgba(15, 23, 42, 1) 100%);
            background-color: var(--bg-dark);
            animation: pulse 10s infinite alternate;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .container {
            width: 90%;
            max-width: 480px;
            padding: 3rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .store-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .btn-google {
            background: #000;
            border: 1px solid #333;
        }

        .btn-apple {
            background: #000;
            border: 1px solid #333;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(255, 151, 0, 0.3);
            border-color: rgba(255, 151, 0, 0.5);
        }

        .btn img {
            height: 24px;
            width: auto;
        }

        .btn-text {
            text-align: left;
        }

        .btn-text span {
            display: block;
            font-size: 0.7rem;
            font-weight: 400;
            color: var(--text-dim);
        }

        .footer {
            margin-top: 2.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Mobile specific adjustments */
        @media (max-width: 400px) {
            .container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="background"></div>

    <div class="container">
        <h1 class="logo">Daw2ni</h1>
        <p class="tagline">The best way to discover and order your favorite meals.</p>

        <div class="store-buttons">
            <a href="https://play.google.com/store/apps/details?id=com.rar_it.dw2ni.customer" class="btn btn-google"
                id="google-play-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg"
                    alt="Google Play">
                <div class="btn-text">
                    <span>GET IT ON</span>
                    Google Play
                </div>
            </a>

            <!-- Replace ID below with the actual App Store ID once available -->
            <a href="https://apps.apple.com/app/6740519283" class="btn btn-apple" id="app-store-btn">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg"
                    alt="App Store">
                <div class="btn-text">
                    <span>Download on the</span>
                    App Store
                </div>
            </a>
        </div>

        <p class="footer">Redirecting you to the app store...</p>
    </div>

    <script>
        (function () {
            const urlParams = new URLSearchParams(window.location.search);
            const pathSegments = window.location.pathname.split('/').filter(p => p);

            let mealId = urlParams.get('meal');
            let restaurantId = urlParams.get('restaurant');

            // Handle path-based links like /meals/ID or /restaurants/ID
            if (pathSegments.length >= 2) {
                if (pathSegments[0] === 'meals') mealId = pathSegments[1];
                if (pathSegments[0] === 'restaurants') restaurantId = pathSegments[1];
            }

            console.log('Deep Link Params:', { mealId, restaurantId });

            const userAgent = navigator.userAgent || navigator.vendor || window.opera;

            const isAndroid = /android/i.test(userAgent);
            const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;

            const googlePlayUrl = "https://play.google.com/store/apps/details?id=com.rar_it.dw2ni.customer";
            const appStoreUrl = "https://apps.apple.com/app/id6740519283";

            if (isAndroid) {
                console.log('Redirecting to Google Play');
                setTimeout(() => {
                    window.location.href = googlePlayUrl;
                }, 1500);
            } else if (isIOS) {
                console.log('Redirecting to App Store');
                setTimeout(() => {
                    window.location.href = appStoreUrl;
                }, 1500);
            } else {
                console.log('Platform not determined or Desktop. Staying on page.');
                document.querySelector('.footer').innerText = "Choose your platform to download the app.";
            }
        })();
    </script>
</body>

</html>
